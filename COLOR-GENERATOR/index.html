<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Color Palette Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Color Palette Generator</h1>
        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Palette
        </button>
        <div class="palette-container">
            <!-- COLOR BOX 1 -->
            <div class="color-box">
                <div class="color" style="background-color: #0c709e;"></div>
                <div class="color-info">
                    <span class="hex-value">#0C709E</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
            <!-- COLOR BOX 2 -->
            <div class="color-box">
                <div class="color" style="background-color: #0c709e;"></div>
                <div class="color-info">
                    <span class="hex-value">#0C709E</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
            <!-- COLOR BOX 3 -->
            <div class="color-box">
                <div class="color" style="background-color: #8b0e9c;"></div>
                <div class="color-info">
                    <span class="hex-value">#0C709E</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
            <!-- COLOR BOX 4 -->
            <div class="color-box">
                <div class="color" style="background-color: #c95f13;"></div>
                <div class="color-info">
                    <span class="hex-value">#0C709E</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
            <!-- COLOR BOX 5 -->
            <div class="color-box">
                <div class="color" style="background-color: #0fbe41;"></div>
                <div class="color-info">
                    <span class="hex-value">#0C709E</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
